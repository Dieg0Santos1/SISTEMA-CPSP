spring:
  application:
    name: sistema-cpsp-backend
  profiles:
    default: local
  jackson:
    time-zone: America/Lima
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

info:
  app:
    name: Sistema CPSP Backend
    description: API institucional para el Colegio de Psicologos de Lima
    version: 0.1.0

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
